name: 'codeprobe'
description: 'DevTools for AI Coding — context analysis, prompt testing, and quality checks'
author: 'thamer-all'
branding:
  icon: 'search'
  color: 'blue'

inputs:
  command:
    description: 'Command to run: check, scan, test, lint, security, context, quality'
    required: false
    default: 'check'
  path:
    description: 'Path to analyze'
    required: false
    default: '.'
  post-comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'true'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install codeprobe
      shell: bash
      run: npm install -g codeprobe

    - name: Run codeprobe
      id: codeprobe
      shell: bash
      env:
        CODEPROBE_COMMAND: ${{ inputs.command }}
        CODEPROBE_PATH: ${{ inputs.path }}
      run: |
        set +e
        OUTPUT=$(codeprobe "$CODEPROBE_COMMAND" "$CODEPROBE_PATH" --json 2>&1)
        EXIT_CODE=$?
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

        # Save output to a file to avoid injection
        echo "$OUTPUT" > /tmp/codeprobe-output.txt

        # Also run human-readable version
        echo "--- codeprobe $CODEPROBE_COMMAND ---"
        codeprobe "$CODEPROBE_COMMAND" "$CODEPROBE_PATH" 2>&1 || true

    - name: Post PR Comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const output = fs.readFileSync('/tmp/codeprobe-output.txt', 'utf8');
          const exitCode = '${{ steps.codeprobe.outputs.exit_code }}';
          const command = process.env.CODEPROBE_COMMAND || 'check';
          const status = exitCode === '0' ? '✅' : '❌';

          const body = `## ${status} codeprobe ${command}\n\n\`\`\`json\n${output.slice(0, 60000)}\n\`\`\`\n\n<sub>Posted by [codeprobe](https://github.com/thamer-all/codeprobe)</sub>`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body && c.body.includes('Posted by [codeprobe]'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Set exit code
      if: steps.codeprobe.outputs.exit_code != '0'
      shell: bash
      run: exit 1
